openapi: 3.0.1
info:
  title: LMS API
  version: 1.5.0
servers:
  - url: /api

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ProblemDetails:
      type: object
      description: Стандартный формат ошибок ASP.NET Core (RFC 7807)
      properties:
        type: { type: string, nullable: true }
        title: { type: string, nullable: true }
        status: { type: integer, nullable: true }
        detail: { type: string, nullable: true }

    User:
      type: object
      properties:
        id: { type: string, format: uuid }
        username: { type: string }

    Subject:
      type: object
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        description: { type: string }
      example:
        id: "3fa85f64-5717-4562-b3fc-2c963f66afa6"
        title: "Проектирование архитектуры ПО"
        description: "Курс по UML и паттернам проектирования"

    Participant:
      type: object
      properties:
        userId: { type: string, format: uuid }
        username: { type: string }
        role: { type: string, enum: [Student, Teacher, Admin] }

    TeamDistributionMode:
      type: string
      enum: [Manual, Random, Students, Draft]

    CaptainSelectionMethod:
      type: string
      enum: [Manual, Voting, Random]

    SubmissionDecisionMode:
      type: string
      enum: [Voting, CaptainDecides]

    TeamSettingsRequest:
      type: object
      properties:
        distributionMode: { $ref: '#/components/schemas/TeamDistributionMode' }
        fixedTeamsCount: { type: integer, nullable: true }
        fixedTeamSize: { type: integer, nullable: true }
        minTeamSize: { type: integer, nullable: true }
        maxTeamSize: { type: integer, nullable: true }
        captainSelectionMode: { $ref: '#/components/schemas/CaptainSelectionMethod', nullable: true }
        captainVotingDeadlineDays: { type: integer, nullable: true }
        requiresCaptain: { type: boolean, nullable: true }
        decisionMode: { $ref: '#/components/schemas/SubmissionDecisionMode', nullable: true }
        decisionDeadlineDays: { type: integer, nullable: true }
        requiresDecision: { type: boolean, nullable: true }

    TeamSettingsResponse:
      type: object
      properties:
        subjectId: { type: string, format: uuid }
        distributionMode: { $ref: '#/components/schemas/TeamDistributionMode' }
        fixedTeamsCount: { type: integer, nullable: true }
        fixedTeamSize: { type: integer, nullable: true }
        minTeamSize: { type: integer, nullable: true }
        maxTeamSize: { type: integer, nullable: true }
        captainSelectionMode: { $ref: '#/components/schemas/CaptainSelectionMethod', nullable: true }
        captainVotingDeadlineDays: { type: integer, nullable: true }
        requiresCaptain: { type: boolean }
        decisionMode: { $ref: '#/components/schemas/SubmissionDecisionMode', nullable: true }
        decisionDeadlineDays: { type: integer, nullable: true }
        requiresDecision: { type: boolean }
        isFinalized: { type: boolean }
        finalizedAt: { type: string, format: date-time, nullable: true }
        captainSelectionMode: { $ref: '#/components/schemas/CaptainSelectionMethod', nullable: true }
        captainVotingDeadlineDays: { type: integer, nullable: true }
        requiresCaptain: { type: boolean }
        decisionMode: { $ref: '#/components/schemas/SubmissionDecisionMode', nullable: true }
        decisionDeadlineDays: { type: integer, nullable: true }
        requiresDecision: { type: boolean }
        warnings:
          type: array
          items: { type: string }

    ManualTeamRequest:
      type: object
      properties:
        memberIds:
          type: array
          items: { type: string, format: uuid }

    UnassignedStudentsResponse:
      type: object
      properties:
        subjectId: { type: string, format: uuid }
        studentIds:
          type: array
          items: { type: string, format: uuid }
        students:
          type: array
          items: { $ref: '#/components/schemas/TeamMember' }
    ManualTeamDistributionRequest:
      type: object
      properties:
        teams:
          type: array
          items: { $ref: '#/components/schemas/ManualTeamRequest' }

    TeamMember:
      type: object
      properties:
        userId: { type: string, format: uuid }
        username: { type: string }
        isCaptain: { type: boolean }

    Team:
      type: object
      properties:
        id: { type: string, format: uuid }
        subjectId: { type: string, format: uuid }
        name: { type: string, nullable: true }
        captainId: { type: string, format: uuid, nullable: true }
        memberIds:
          type: array
          items: { type: string, format: uuid }
        members:
          type: array
          items: { $ref: '#/components/schemas/TeamMember' }

    TeamDistributionResponse:
      type: object
      properties:
        teams:
          type: array
          items: { $ref: '#/components/schemas/Team' }
        warnings:
          type: array
          items: { type: string }

    RandomTeamPreviewTeam:
      type: object
      properties:
        memberIds:
          type: array
          items: { type: string, format: uuid }

    RandomTeamDistributionSuggestion:
      type: object
      properties:
        suggestedTeamsCount: { type: integer }
        suggestedMinTeamSize: { type: integer }
        suggestedMaxTeamSize: { type: integer }
        suggestedFixedTeamSize: { type: integer, nullable: true }
        suggestedTeamSizes:
          type: array
          items: { type: integer }

    TeamRandomPreviewResponse:
      type: object
      properties:
        subjectId: { type: string, format: uuid }
        isValid: { type: boolean }
        teams:
          type: array
          items: { $ref: '#/components/schemas/RandomTeamPreviewTeam' }
        errors:
          type: array
          items: { type: string }
        warnings:
          type: array
          items: { type: string }
        suggestedParameters:
          $ref: '#/components/schemas/RandomTeamDistributionSuggestion'

    TeamValidationResponse:
      type: object
      properties:
        isValid: { type: boolean }
        errors:
          type: array
          items: { type: string }
        warnings:
          type: array
          items: { type: string }

    TeamFinalizeResponse:
      type: object
      properties:
        isFinalized: { type: boolean }
        finalizedAt: { type: string, format: date-time, nullable: true }

    # ==========================================
    # DRAFT
    # ==========================================
    DraftStartRequest:
      type: object
      required: [captainIds]
      properties:
        captainIds:
          type: array
          items: { type: string, format: uuid }
          description: Список ID студентов-капитанов (порядок определяет очередь выбора)

    DraftPickRequest:
      type: object
      required: [studentId]
      properties:
        studentId:
          type: string
          format: uuid
          description: ID студента для выбора в команду

    DraftStateResponse:
      type: object
      properties:
        subjectId: { type: string, format: uuid }
        isActive: { type: boolean, description: "Драфт активен" }
        isCompleted: { type: boolean, description: "Драфт завершён" }
        currentCaptainId: { type: string, format: uuid, nullable: true, description: "ID капитана, чья очередь выбирать" }
        currentRound: { type: integer, description: "Номер текущего раунда" }
        teams:
          type: array
          items: { $ref: '#/components/schemas/Team' }
        availableStudents:
          type: array
          items: { $ref: '#/components/schemas/TeamMember' }
          description: Студенты, которые ещё не распределены

    # ==========================================
    # STUDENTS SELF-ASSEMBLY
    # ==========================================
    StudentCreateTeamRequest:
      type: object
      properties:
        name: { type: string, nullable: true, description: "Название команды" }

    # ==========================================
    # ИЕРАРХИЯ POST (Полиморфизм)
    # ==========================================
    BasePost:
      type: object
      discriminator:
        propertyName: postType
      required:
        - postType
      properties:
        id: { type: string, format: uuid }
        authorId: { type: string, format: uuid }
        postType: { type: string, enum: [Announcement, Material, Assignment] }
        content: { type: string }
        createdAt: { type: string, format: date-time }

    Announcement:
      allOf:
        - $ref: '#/components/schemas/BasePost'
        - type: object
          description: Текстовое объявление

    Material:
      allOf:
        - $ref: '#/components/schemas/BasePost'
        - type: object
          properties:
            fileName: { type: string }
            storagePath: { type: string }
            fileSize: { type: integer }
            downloadUrl: { type: string }

    MaterialFileInfo:
      type: object
      properties:
        fileName: { type: string }
        fileSize: { type: integer }
        downloadUrl: { type: string }

    # ==========================================
    # ВОПРОСЫ И ЗАДАНИЯ
    # ==========================================
    QuestionOption:
      type: object
      required: [id, text]
      properties:
        id: { type: string, format: uuid }
        text: { type: string }

    Question:
      type: object
      required: [id, questionType, questionData]
      properties:
        id: { type: string, format: uuid }
        questionType: { type: string, enum: [SingleChoice, MultipleChoice, Text, File] }
        questionData: { type: string }
        options: 
          type: array
          description: Опции для выбора (только для SingleChoice и MultipleChoice)
          items: { $ref: '#/components/schemas/QuestionOption' }
      example:
        id: "123e4567-e89b-12d3-a456-426614174000"
        questionType: "MultipleChoice"
        questionData: "Выберите порождающие паттерны"
        options:
          - id: "223e4567-e89b-12d3-a456-426614174001"
            text: "Singleton"
          - id: "323e4567-e89b-12d3-a456-426614174002"
            text: "Factory Method"
          - id: "423e4567-e89b-12d3-a456-426614174003"
            text: "Observer"

    Assignment:
      allOf:
        - $ref: '#/components/schemas/BasePost'
        - type: object
          properties:
            subjectId: { type: string, format: uuid }
            assignmentData: { type: string }
            questions: 
              type: array
              items: { $ref: '#/components/schemas/Question' }

    # ==========================================
    # ОТВЕТЫ СТУДЕНТА (Полиморфизм)
    # ==========================================
    AnswerBase:
      type: object
      required: [questionId, answerType]
      properties:
        questionId: { type: string, format: uuid }
        answerType: { type: string, enum: [SingleChoiceAnswer, MultipleChoiceAnswer, TextAnswer] }

    SingleChoiceAnswer:
      allOf:
        - $ref: '#/components/schemas/AnswerBase'
        - type: object
          required: [selectedOptionId]
          properties:
            selectedOptionId: { type: string, format: uuid }

    MultipleChoiceAnswer:
      allOf:
        - $ref: '#/components/schemas/AnswerBase'
        - type: object
          required: [selectedOptionIds]
          properties:
            selectedOptionIds:
              type: array
              items: { type: string, format: uuid }
              minItems: 1

    TextAnswer:
      allOf:
        - $ref: '#/components/schemas/AnswerBase'
        - type: object
          required: [text]
          properties:
            text: { type: string }

    AnswerItem:
      discriminator:
        propertyName: answerType
      oneOf:
        - $ref: '#/components/schemas/SingleChoiceAnswer'
        - $ref: '#/components/schemas/MultipleChoiceAnswer'
        - $ref: '#/components/schemas/TextAnswer'

    # ==========================================
    # РЕШЕНИЯ И ОЦЕНКИ
    # ==========================================
    Submission:
      type: object
      properties:
        id: { type: string, format: uuid }
        assignmentId: { type: string, format: uuid }
        authorId: { type: string, format: uuid }
        answers:
          type: array
          items: { $ref: '#/components/schemas/AnswerItem' }
        status: { type: string, enum: [Draft, RequiresReview, Graded] }
        submittedAt: { type: string, format: date-time, nullable: true }

    SubmissionCreateRequest:
      type: object
      required: [answers]
      properties:
        answers:
          type: array
          items: { $ref: '#/components/schemas/AnswerItem' }

    Grade:
      type: object
      properties:
        id: { type: string, format: uuid }
        submissionId: { type: string, format: uuid }
        score: { type: integer }
        verdictText: { type: string }
        verdictedAt: { type: string, format: date-time }

    TeamGrade:
      type: object
      properties:
        id: { type: string, format: uuid }
        teamId: { type: string, format: uuid }
        assignmentId: { type: string, format: uuid }
        submissionId: { type: string, format: uuid }
        score: { type: integer }
        verdictText: { type: string }
        verdictedAt: { type: string, format: date-time }

    TeamGradeCreateRequest:
      type: object
      required: [submissionId, score]
      properties:
        submissionId: { type: string, format: uuid }
        score: { type: integer }
        verdictText: { type: string }

    TeamGradeUpdateRequest:
      type: object
      required: [score]
      properties:
        score: { type: integer }
        verdictText: { type: string }

    TeamMemberGrade:
      type: object
      properties:
        id: { type: string, format: uuid, nullable: true }
        teamGradeId: { type: string, format: uuid }
        teamId: { type: string, format: uuid }
        assignmentId: { type: string, format: uuid }
        studentId: { type: string, format: uuid }
        username: { type: string }
        baseScore: { type: integer }
        score: { type: integer }
        isAdjusted: { type: boolean }
        adjustedAt: { type: string, format: date-time, nullable: true }

    TeamMemberGradeAdjustmentRequest:
      type: object
      required: [score]
      properties:
        score: { type: integer }
    Comment:
      type: object
      properties:
        id: { type: string, format: uuid }
        targetType: { type: string, enum: [Post, Submission] }
        targetId: { type: string, format: uuid }
        authorId: { type: string, format: uuid }
        text: { type: string }
        createdAt: { type: string, format: date-time }

security:
  - bearerAuth: []

paths:
  # ==========================================
  # USERS
  # ==========================================
  /users/me:
    get:
      tags: [Users]
      summary: Получить профиль текущего пользователя
      responses:
        '200':
          description: OK
          content: { application/json: { schema: { $ref: '#/components/schemas/User' } } }
        '401':
          description: Unauthorized
          content: { application/problem+json: { schema: { $ref: '#/components/schemas/ProblemDetails' } } }

  # ==========================================
  # SUBJECTS
  # ==========================================
  /subjects:
    get:
      tags: [Subjects]
      summary: Получить список предметов
      description: Возвращает предметы, в которых текущий пользователь является участником.
      parameters:
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
      responses:
        '200':
          description: OK
          content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/Subject' } } } }
        '401':
          description: Unauthorized
          content: { application/problem+json: { schema: { $ref: '#/components/schemas/ProblemDetails' } } }
    post:
      tags: [Subjects]
      summary: Создать предмет (создатель автоматически становится ADMIN)
      requestBody:
        required: true
        content: { application/json: { schema: { type: object, properties: { title: { type: string }, description: { type: string } } } } }
      responses:
        '201':
          description: Created
          content: { application/json: { schema: { $ref: '#/components/schemas/Subject' } } }
        '401':
          description: Unauthorized
          content: { application/problem+json: { schema: { $ref: '#/components/schemas/ProblemDetails' } } }

  /subjects/{subjectId}:
    get:
      tags: [Subjects]
      summary: Получить информацию о предмете
      parameters:
        - name: subjectId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: OK
          content: { application/json: { schema: { $ref: '#/components/schemas/Subject' } } }
        '401':
          description: Unauthorized
          content: { application/problem+json: { schema: { $ref: '#/components/schemas/ProblemDetails' } } }
        '403':
          description: Forbidden. Пользователь не состоит в предмете.
          content: { application/problem+json: { schema: { $ref: '#/components/schemas/ProblemDetails' } } }
        '404':
          description: Not Found
          content: { application/problem+json: { schema: { $ref: '#/components/schemas/ProblemDetails' } } }
    put:
      tags: [Subjects]
      summary: Редактировать предмет
      parameters:
        - name: subjectId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content: { application/json: { schema: { type: object, properties: { title: { type: string }, description: { type: string } } } } }
      responses:
        '200':
          description: OK
          content: { application/json: { schema: { $ref: '#/components/schemas/Subject' } } }
        '401':
          description: Unauthorized
          content: { application/problem+json: { schema: { $ref: '#/components/schemas/ProblemDetails' } } }
        '403':
          description: Forbidden. Только для роли ADMIN.
          content: { application/problem+json: { schema: { $ref: '#/components/schemas/ProblemDetails' } } }
        '404':
          description: Not Found
          content: { application/problem+json: { schema: { $ref: '#/components/schemas/ProblemDetails' } } }
    delete:
      tags: [Subjects]
      summary: Удалить предмет
      parameters:
        - name: subjectId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204':
          description: No Content
        '401':
          description: Unauthorized
          content: { application/problem+json: { schema: { $ref: '#/components/schemas/ProblemDetails' } } }
        '403':
          description: Forbidden. Только для роли ADMIN.
          content: { application/problem+json: { schema: { $ref: '#/components/schemas/ProblemDetails' } } }
        '404':
          description: Not Found
          content: { application/problem+json: { schema: { $ref: '#/components/schemas/ProblemDetails' } } }

  /subjects/{subjectId}/join:
    post:
      tags: [Subjects]
      summary: Присоединиться к предмету самостоятельно (роль Student)
      parameters:
        - name: subjectId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Успешно присоединен
          content: { application/json: { schema: { $ref: '#/components/schemas/Participant' } } }
        '401':
          description: Unauthorized
          content: { application/problem+json: { schema: { $ref: '#/components/schemas/ProblemDetails' } } }
        '404':
          description: Not Found
          content: { application/problem+json: { schema: { $ref: '#/components/schemas/ProblemDetails' } } }

  # ==========================================
  # PARTICIPANTS
  # ==========================================
  /subjects/{subjectId}/participants:
    get:
      tags: [Participants]
      summary: Получить список участников предмета
      parameters:
        - name: subjectId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: limit
          in: query
          schema: { type: integer, default: 50 }
        - name: offset
          in: query
          schema: { type: integer, default: 0 }
      responses:
        '200':
          description: OK
          content: { application/json: { schema: { type: array, items: { $ref: '#/components/schemas/Participant' } } } }
        '401':
          description: Unauthorized
          content: { application/problem+json: { schema: { $ref: '#/components/schemas/ProblemDetails' } } }
        '403':
          description: Forbidden. Пользователь не состоит в предмете.
          content: { application/problem+json: { schema: { $ref: '#/components/schemas/ProblemDetails' } } }
    post:
      tags: [Participants]
      summary: Добавить участника вручную (только ADMIN)
      parameters:
        - name: subjectId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content: { application/json: { schema: { type: object, properties: { userId: { type: string, format: uuid }, role: { type: string, enum: [Student, Teacher] } } } } }
      responses:
        '201':
          description: Created
          content: { application/json: { schema: { $ref: '#/components/schemas/Participant' } } }
        '401':
          description: Unauthorized
          content: { application/problem+json: { schema: { $ref: '#/components/schemas/ProblemDetails' } } }
        '403':
          description: Forbidden. Только ADMIN.
          content: { application/problem+json: { schema: { $ref: '#/components/schemas/ProblemDetails' } } }

  /subjects/{subjectId}/participants/{userId}:
    patch:
      tags: [Participants]
      summary: Изменить роль пользователя
      parameters:
        - name: subjectId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: userId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content: { application/json: { schema: { type: object, properties: { role: { type: string, enum: [Student, Teacher] } } } } }
      responses:
        '200':
          description: OK
          content: { application/json: { schema: { $ref: '#/components/schemas/Participant' } } }
        '401':
          description: Unauthorized
          content: { application/problem+json: { schema: { $ref: '#/components/schemas/ProblemDetails' } } }
        '403':
          description: Forbidden. Только ADMIN. Передать роль ADMIN другому нельзя.
          content: { application/problem+json: { schema: { $ref: '#/components/schemas/ProblemDetails' } } }
    delete:
      tags: [Participants]
      summary: Удалить пользователя из предмета
      parameters:
        - name: subjectId
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: userId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '204':
          description: No Content
        '401':
          description: Unauthorized
          content: { application/problem+json: { schema: { $ref: '#/components/schemas/ProblemDetails' } } }
        '403':
          description: Forbidden. Только ADMIN.
          content: { application/problem+json: { schema: { $ref: '#/components/schemas/ProblemDetails' } } }

  # ==========================================
  # ==========================================
  # TEAMS
  # ==========================================
  /subjects/{subjectId}/teams/settings:
    get:
      tags: [Teams]
      summary: Get team settings
      parameters:
        - name: subjectId
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TeamSettingsResponse' }
        '400':
          description: Bad Request
          content: { application/problem+json: { schema: { $ref: '#/components/schemas/ProblemDetails' } } }
        '401':
          description: Unauthorized
          content: { application/problem+json: { schema: { $ref: '#/components/schemas/ProblemDetails' } } }
        '403':
          description: Forbidden. Teacher/Admin only.
          content: { application/problem+json: { schema: { $ref: '#/components/schemas/ProblemDetails' } } }
    put:
      tags: [Teams]
      summary: Сохранить настройки формирования команд
      parameters:
        - name: subjectId
          in: path
          required: true
          schema: { type: string, format: uuid }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/TeamSettingsRequest' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TeamSettingsResponse' }
        '400':
          description: Bad Request
          content: { application/problem+json: { schema: { $ref: '#/components/schemas/ProblemDetails' } } }
        '401':
          description: Unauthorized
          content: { application/problem+json: { schema: { $ref: '#/components/schemas/ProblemDetails' } } }
        '403':
          description: Forbidden. Только для Teacher/Admin.
          content: { application/problem+json: { schema: { $ref: '#/components/schemas/ProblemDetails' } } }

  /subjects/{subjectId}/teams:
    get:
      tags: [Teams]
      summary: Получить список команд предмета
      parameters:
        - name: subjectId
          in: path
          required: true
